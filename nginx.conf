# Nginx configuration for containerized deployment
# Place in /etc/nginx/conf.d/

server {
    listen 80;
    server_name localhost;

    # Health check endpoint
    location /health {
        proxy_pass http://localhost:9000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API endpoints
    location /scrape {
        proxy_pass http://localhost:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type $content_type;
        
        # Increase timeout for scraping
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /jobs {
        proxy_pass http://localhost:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type $content_type;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=scraper:10m rate=10r/s;
}

# Logging format
log_format scraper '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent"';