name: Deploy to Alibaba Cloud

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

env:
  REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
  REGION: ${{ secrets.ALIYUN_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Setup Alibaba Cloud CLI
        run: |
          curl -O https://alibabacloud-cli-latest.oss-cn-hangzhou.aliyuncs.com/alibabacloud_cli_latest_linux
          chmod +x alibabacloud_cli_latest_linux
          ./alibabacloud_cli_latest_linux
          
      - name: Login to Alibaba Cloud
        uses: alibabacloud/configure-aliyun@v1
        with:
          access-key-id: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          
      - name: Deploy to Function Compute
        run: |
          aliyun fc Deploy --template ./aliyun-fc.yaml
          --access-key-id ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          --access-key-secret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}